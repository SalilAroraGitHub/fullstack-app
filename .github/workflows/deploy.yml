name: Fullstack CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          script: |
            echo "🚀 Connecting to server..."

            cd /root/fullstack-app || exit 1

            echo "📥 Reset + Pull latest code..."
            git reset --hard
            git pull origin main

            echo "🔧 Backend setup..."
            cd backend || exit 1
            npm install --legacy-peer-deps || true

            pm2 delete backend || true
            pm2 start index.js --name backend

            echo "🎨 Frontend setup..."
            cd ../frontend || exit 1
            npm install --legacy-peer-deps || true

            rm -rf build
            npm run build

            pm2 delete frontend || true
            pm2 serve build 3000 --name frontend

            pm2 save

            echo "✅ Deployment Done!"